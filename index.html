<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bons AI</title>

<style>
*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
transition:0.3s;
}

.dark{
background:#111;
color:white;
}

.app{
width:100%;
max-width:420px;
height:90vh;
background:white;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
overflow:hidden;
display:flex;
flex-direction:column;
}

.dark .app{
background:#1e1e1e;
}

.header{
background:linear-gradient(135deg,#6c63ff,#4f46e5);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.chat{
flex:1;
padding:14px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
background:#f7f8fc;
}

.dark .chat{
background:#151515;
}

.msg{
max-width:80%;
padding:10px 12px;
border-radius:14px;
font-size:14px;
}

.user{
align-self:flex-end;
background:#4f46e5;
color:white;
}

.bot{
align-self:flex-start;
background:#e9ecf7;
}

.dark .bot{
background:#2a2a2a;
color:white;
}

.preview-area{
padding:10px;
border-top:1px solid #eee;
}

.controls{
display:flex;
gap:8px;
padding:12px;
border-top:1px solid #eaeaea;
}

.controls input{
flex:1;
padding:12px;
border:1px solid #d8dbe8;
border-radius:12px;
}

button,.upload-btn{
background:#4f46e5;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
}

#darkToggle{
background:black;
}

img{
max-width:100%;
max-height:160px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div>
<h1>Bons AI</h1>
<p>Created by Omar Saad</p>
</div>

<button id="darkToggle">🌙</button>

</div>

<div class="chat" id="chat">

<div class="msg bot">
Hi, I'm Bons AI. I now support dark mode, typing animation, and memory.
</div>

</div>

<div class="preview-area">
<label class="upload-btn" for="imageUpload">Upload Image</label>
<input type="file" id="imageUpload" accept="image/*">
<img id="imagePreview">
</div>

<div class="controls">
<input id="userInput" placeholder="Ask Bons AI anything...">
<button id="sendBtn">Send</button>
</div>

</div>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("userInput")
const send=document.getElementById("sendBtn")
const dark=document.getElementById("darkToggle")
const upload=document.getElementById("imageUpload")
const preview=document.getElementById("imagePreview")

let conversation=[]
let uploadedImage=null

function addMessage(text,type){

const msg=document.createElement("div")
msg.className="msg "+type
msg.textContent=text

chat.appendChild(msg)
chat.scrollTop=chat.scrollHeight

}

function showTyping(){

const typing=document.createElement("div")
typing.className="msg bot"
typing.id="typing"
typing.textContent="Bons AI is typing..."

chat.appendChild(typing)
chat.scrollTop=chat.scrollHeight

}

function removeTyping(){

const t=document.getElementById("typing")
if(t) t.remove()

}

function fakeAI(text){

text=text.toLowerCase()

if(text.includes("who created you"))
return "I was created by Omar Saad."

if(text.includes("name"))
return "My name is Bons AI."

if(text.includes("features"))
return "I support dark mode, image uploads, typing animation, and chat memory."

if(uploadedImage && text.includes("image"))
return "I see you uploaded an image. Full AI vision can be added later."

return "That's interesting! I'm currently running in demo AI mode."

}

function sendMessage(){

const text=input.value.trim()

if(!text) return

addMessage(text,"user")

conversation.push({role:"user",content:text})

input.value=""

showTyping()

setTimeout(()=>{

removeTyping()

const reply=fakeAI(text)

addMessage(reply,"bot")

conversation.push({role:"assistant",content:reply})

},800)

}

send.onclick=sendMessage

input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})

dark.onclick=()=>{
document.body.classList.toggle("dark")
}

upload.addEventListener("change",e=>{

const file=e.target.files[0]

if(!file) return

const reader=new FileReader()

reader.onload=function(e){

uploadedImage=e.target.result
preview.src=uploadedImage
preview.style.display="block"

addMessage("Image uploaded successfully.","bot")

}

reader.readAsDataURL(file)

})

</script>

</body>
</html>
